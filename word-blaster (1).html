<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WORD BLASTER — 英文學習射擊遊戲</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#020310;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;font-family:'Courier New',monospace;
  user-select:none;-webkit-user-select:none;
}
#title{color:#FFD700;font-size:clamp(12px,2vw,16px);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:6px;text-align:center;text-shadow:0 0 12px rgba(255,200,0,0.4);}
#title span{color:#00ffcc;}
#wrap{position:relative;width:min(700px,100vw);}
canvas{display:block;width:100%;border-radius:10px;cursor:crosshair;
  border:1px solid rgba(30,70,160,0.35);box-shadow:0 0 28px rgba(0,80,200,0.1);}
#hint{text-align:center;color:rgba(80,120,180,0.7);font-size:clamp(9px,1.4vw,12px);
  margin-top:5px;letter-spacing:0.5px;}
#hint b{color:#00ffcc;}
</style>
</head>
<body>
<div id="title">⚡ <span>WORD BLASTER</span> · 英文學習射擊遊戲 ⚡</div>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hint">WASD/方向鍵移動 &nbsp;·&nbsp; 滑鼠瞄準+<b>按住左鍵</b>射擊 &nbsp;·&nbsp; 手機：左半移動，右半射擊 &nbsp;·&nbsp; P暫停</div>
<script>
(function(){
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const W=700,H=520;
cv.width=W;cv.height=H;

// ── VOCAB DATABASE (30 words, 4 levels) ─────────────────────────────
const VOCAB=[
  {en:'APPLE',zh:'蘋果',hint:'A red or green fruit',lv:1},
  {en:'BOOK',zh:'書本',hint:'You read this',lv:1},
  {en:'CAT',zh:'貓',hint:'A furry pet that meows',lv:1},
  {en:'DOG',zh:'狗',hint:"Man's best friend",lv:1},
  {en:'FISH',zh:'魚',hint:'Lives in water, has fins',lv:1},
  {en:'HAPPY',zh:'快樂',hint:'Feeling of joy',lv:1},
  {en:'HOUSE',zh:'房屋',hint:'A place to live',lv:1},
  {en:'WATER',zh:'水',hint:'Essential for life, H₂O',lv:1},
  {en:'FRIEND',zh:'朋友',hint:'Someone you like and trust',lv:2},
  {en:'SCHOOL',zh:'學校',hint:'Where you learn',lv:2},
  {en:'MUSIC',zh:'音樂',hint:'Sound arranged in patterns',lv:2},
  {en:'STRONG',zh:'強壯',hint:'Having great power',lv:2},
  {en:'BRAVE',zh:'勇敢',hint:'Having courage',lv:2},
  {en:'SMILE',zh:'微笑',hint:'A happy expression',lv:2},
  {en:'DREAM',zh:'夢想',hint:'Hope for the future',lv:2},
  {en:'PLANET',zh:'行星',hint:'Orbits around a star',lv:3},
  {en:'GALAXY',zh:'星系',hint:'Billions of stars together',lv:3},
  {en:'THUNDER',zh:'雷聲',hint:'Sound during a storm',lv:3},
  {en:'CRYSTAL',zh:'水晶',hint:'Clear mineral structure',lv:3},
  {en:'VICTORY',zh:'勝利',hint:'Winning a battle',lv:3},
  {en:'JOURNEY',zh:'旅程',hint:'A long trip',lv:3},
  {en:'MYSTERY',zh:'謎',hint:'Something unexplained',lv:3},
  {en:'HORIZON',zh:'地平線',hint:'Where sky meets earth',lv:4},
  {en:'QUANTUM',zh:'量子',hint:'Tiny unit of energy',lv:4},
  {en:'ECLIPSE',zh:'蝕',hint:"When one body blocks another's light",lv:4},
  {en:'ANCIENT',zh:'古老',hint:'Very old, from long ago',lv:4},
  {en:'INFINITE',zh:'無限',hint:'Without end or limit',lv:4},
  {en:'COURAGE',zh:'勇氣',hint:'Bravery in face of fear',lv:4},
  {en:'WISDOM',zh:'智慧',hint:'Deep knowledge and insight',lv:4},
  {en:'PHOENIX',zh:'鳳凰',hint:'Mythical fire bird reborn',lv:4},
];

// ── State ────────────────────────────────────────────────────────────
let state='menu',paused=false;
let score=0,hiScore=parseInt(localStorage.getItem('wb_hi')||'0');
let wave=1,lives=3,combo=0,comboTimer=0;
let shakeAmt=0,shakeX=0,shakeY=0;
let bgStars=[],bgNebula=[];
let bullets=[],eBullets=[],particles=[],explosions=[],pickupTexts=[];
let enemies=[],player;
let currentWord=null,letterIdx=0;
let modeType='spell';
let modeLabel='';
let streak=0;
let totalCorrect=0,totalWrong=0;
const keys={};
let mx=W/2,my=H/2,mdown=false;
let touchMove=null,touchFire=null;

// ── Input ────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if((e.code==='KeyP'||e.code==='Escape')&&state==='playing')paused=!paused;
  if(e.code==='Space'&&(state==='menu'||state==='dead'||state==='results'))startGame();
  e.preventDefault();
},{passive:false,capture:false});
document.addEventListener('keyup',e=>keys[e.code]=false);

function toG(cx,cy){const r=cv.getBoundingClientRect();return{x:(cx-r.left)*(W/r.width),y:(cy-r.top)*(H/r.height)};}
cv.addEventListener('mousemove',e=>{const g=toG(e.clientX,e.clientY);mx=g.x;my=g.y;});
cv.addEventListener('mousedown',e=>{mdown=true;const g=toG(e.clientX,e.clientY);mx=g.x;my=g.y;
  if(state==='menu'||state==='dead'||state==='results')startGame();});
cv.addEventListener('mouseup',()=>mdown=false);
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const g=toG(t.clientX,t.clientY);
    if(g.x<W/2)touchMove={id:t.identifier,ox:g.x,oy:g.y,cx:g.x,cy:g.y};
    else{touchFire={id:t.identifier,x:g.x,y:g.y};mx=g.x;my=g.y;mdown=true;}
  }
  if(state==='menu'||state==='dead'||state==='results')startGame();
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(touchMove&&t.identifier===touchMove.id){const g=toG(t.clientX,t.clientY);touchMove.cx=g.x;touchMove.cy=g.y;}
    if(touchFire&&t.identifier===touchFire.id){const g=toG(t.clientX,t.clientY);touchFire.x=g.x;touchFire.y=g.y;mx=g.x;my=g.y;}
  }
},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(touchMove&&t.identifier===touchMove.id)touchMove=null;
    if(touchFire&&t.identifier===touchFire.id){touchFire=null;mdown=false;}
  }
},{passive:false});

// ── Background ───────────────────────────────────────────────────────
function initBG(){
  bgStars=[];
  for(let i=0;i<170;i++)bgStars.push({x:Math.random()*W,y:Math.random()*H,r:0.3+Math.random()*1.7,s:0.1+Math.random()*1.0,b:0.3+Math.random()*0.7});
  bgNebula=[];
  for(let i=0;i<5;i++)bgNebula.push({x:Math.random()*W,y:Math.random()*H,r:60+Math.random()*100,h:200+Math.random()*100});
}

// ── Vocab helpers ────────────────────────────────────────────────────
function getPool(lv){return VOCAB.filter(v=>v.lv<=Math.min(lv,4));}
function pickWords(count,lv){
  const pool=[...getPool(lv)];const result=[];
  for(let i=0;i<count&&pool.length>0;i++){const idx=Math.floor(Math.random()*pool.length);result.push(pool.splice(idx,1)[0]);}
  return result;
}
function getModeForWave(w){const m=w%3;return m===1?'spell':m===2?'translate':'define';}

// ── Wave setup ───────────────────────────────────────────────────────
function setupSpellWave(){
  modeType='spell';
  const lv=Math.ceil(wave/2);
  currentWord=pickWords(1,lv)[0];
  letterIdx=0;
  modeLabel=`📝 拼寫: ${currentWord.zh}  (${currentWord.hint})`;
  enemies=[];
  const w=currentWord.en;
  for(let i=0;i<w.length;i++){
    let x,y,tries=0;
    do{x=65+Math.random()*(W-130);y=70+Math.random()*(H-250);tries++;}
    while(tries<60&&enemies.some(e=>Math.hypot(e.x-x,e.y-y)<80));
    enemies.push({type:'letter',letter:w[i],wi:i,x,y,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*0.9,
      hp:1,maxHp:1,radius:22,dead:false,hitFlash:0,wobble:Math.random()*Math.PI*2,age:0});
  }
}

function setupMCQWave(mode){
  modeType=mode;
  const lv=Math.ceil(wave/2);
  const pool=pickWords(8,lv);
  enemies=[];
  const used=[];
  for(let q=0;q<Math.min(4,pool.length);q++){
    const correct=pool[q];used.push(correct);
    const distractors=VOCAB.filter(v=>v.en!==correct.en&&!used.find(u=>u.en===v.en)).sort(()=>Math.random()-.5).slice(0,3);
    const options=[correct,...distractors].sort(()=>Math.random()-.5);
    const cx=100+q*((W-80)/4),cy=80+Math.random()*(H-280);
    const question=mode==='translate'?correct.zh:`"${correct.hint}"`;
    enemies.push({type:'question',text:question,qi:q,x:cx,y:cy-55,age:0,life:1});
    options.forEach((opt,i)=>{
      const ex=cx-60+i*42,ey=cy+18+Math.sin(i)*8;
      enemies.push({type:'mcq',word:opt.en,zh:opt.zh,isCorrect:opt===correct,question,qi:q,
        x:ex,y:ey,vx:(Math.random()-.5)*0.9,vy:(Math.random()-.5)*0.6,
        hp:1,maxHp:1,radius:26,dead:false,hitFlash:0,wobble:Math.random()*Math.PI*2,age:0});
    });
  }
  modeLabel=mode==='translate'?'🌐 翻譯: 射出正確英文！':'🔍 定義: 射出符合定義嘅單詞！';
}

// ── Game lifecycle ───────────────────────────────────────────────────
function startGame(){
  state='playing';paused=false;
  score=0;wave=1;lives=3;combo=0;comboTimer=0;streak=0;
  totalCorrect=0;totalWrong=0;
  bullets=[];eBullets=[];particles=[];explosions=[];pickupTexts=[];enemies=[];
  player=mkPlayer();initBG();startWave();
}

function startWave(){
  bullets=[];eBullets=[];enemies=[];
  const mode=getModeForWave(wave);
  if(mode==='spell')setupSpellWave();
  else setupMCQWave(mode);
  spawnPT(W/2,H/2-20,
    modeType==='spell'?`WAVE ${wave} — 拼寫模式`:
    modeType==='translate'?`WAVE ${wave} — 翻譯模式`:`WAVE ${wave} — 定義模式`,
    '#FFD700',true);
}

function mkPlayer(){return{x:W/2,y:H-80,hp:100,maxHp:100,speed:4.5,fireRate:10,fireCooldown:0,invincible:0,trail:[],radius:13};}

// ── Fire ─────────────────────────────────────────────────────────────
function fireBullet(){
  if(player.fireCooldown>0)return;
  const tx=touchFire?touchFire.x:mx,ty=touchFire?touchFire.y:my;
  const angle=Math.atan2(ty-player.y,tx-player.x);
  bullets.push({x:player.x,y:player.y,vx:Math.cos(angle)*15,vy:Math.sin(angle)*15,r:5,life:1,trail:[]});
  player.fireCooldown=player.fireRate;shake(0.4);
}

// ── FX helpers ───────────────────────────────────────────────────────
function shake(a){shakeAmt=Math.max(shakeAmt,a);}
function spawnPT(x,y,txt,col,big){pickupTexts.push({x,y,txt,col,life:1,big:big||false,vy:big?-0.4:-1.2});}
function spawnExpl(x,y,big,col){
  const n=big?34:14;
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=big?(2+Math.random()*6):(1+Math.random()*3.5);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col:col||`hsl(${20+Math.random()*40},100%,60%)`,life:1,ml:0.5+Math.random()*0.5,sz:big?(2.5+Math.random()*4):(1.5+Math.random()*2.5)});}
  explosions.push({x,y,r:0,maxR:big?65:28,life:1,col:col||'#ff8800'});
}

// ── Update ────────────────────────────────────────────────────────────
function update(dt){
  if(paused||state!=='playing')return;
  if(shakeAmt>0){shakeX=(Math.random()-.5)*shakeAmt*7;shakeY=(Math.random()-.5)*shakeAmt*7;shakeAmt*=0.8;if(shakeAmt<0.01){shakeAmt=0;shakeX=0;shakeY=0;}}
  for(const s of bgStars){s.y+=s.s;if(s.y>H)s.y=-4;}
  if(combo>0){comboTimer-=dt;if(comboTimer<=0)combo=0;}

  // Player movement
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx-=1;
  if(keys['ArrowRight']||keys['KeyD'])dx+=1;
  if(keys['ArrowUp']||keys['KeyW'])dy-=1;
  if(keys['ArrowDown']||keys['KeyS'])dy+=1;
  if(touchMove){const ddx=touchMove.cx-touchMove.ox,ddy=touchMove.cy-touchMove.oy;const dl=Math.hypot(ddx,ddy);if(dl>8){dx+=ddx/dl;dy+=ddy/dl;}}
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  player.x=Math.max(player.radius,Math.min(W-player.radius,player.x+dx*player.speed));
  player.y=Math.max(player.radius,Math.min(H-player.radius,player.y+dy*player.speed));
  player.trail.push({x:player.x,y:player.y});if(player.trail.length>12)player.trail.shift();
  if(player.invincible>0)player.invincible-=dt;
  if(mdown||touchFire)fireBullet();
  if(player.fireCooldown>0)player.fireCooldown-=dt;

  // Bullets movement
  for(const b of bullets){
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>7)b.trail.shift();
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<-15||b.x>W+15||b.y<-15||b.y>H+15)b.life=0;
  }

  // Enemy bullets
  for(const b of eBullets){
    b.x+=b.vx;b.y+=b.vy;b.life-=0.01;
    if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+10)b.life=0;
    if(b.life>0&&player.invincible<=0&&Math.hypot(b.x-player.x,b.y-player.y)<player.radius+4){hitPlayer(12);b.life=0;}
  }

  // Enemies
  for(const e of enemies){
    if(e.dead||e.type==='question')continue;
    e.age+=dt;e.wobble+=0.035;if(e.hitFlash>0)e.hitFlash-=dt*2;
    e.x+=e.vx;e.y+=e.vy;
    if(e.x<e.radius+5||e.x>W-e.radius-5)e.vx*=-1;
    if(e.y<e.radius+5||e.y>H-e.radius-145)e.vy*=-1;
    e.x=Math.max(e.radius+5,Math.min(W-e.radius-5,e.x));
    e.y=Math.max(e.radius+5,Math.min(H-e.radius-145,e.y));
    // Occasional fire at player
    if(Math.random()<0.0008*dt){
      const a=Math.atan2(player.y-e.y,player.x-e.x);
      eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:1,col:e.type==='mcq'?(e.isCorrect?'#004400':'#664400'):'#446688',r:4});
    }
    // Bullet collision
    for(const b of bullets){
      if(b.life<=0)continue;
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.radius+b.r){
        b.life=0;e.hitFlash=0.4;
        if(modeType==='spell')hitSpellEnemy(e);
        else hitMCQEnemy(e);
        break;
      }
    }
  }
  enemies=enemies.filter(e=>!e.dead);
  // Remove orphaned question labels
  enemies=enemies.filter(e=>{
    if(e.type!=='question')return true;
    return enemies.some(x=>x.type==='mcq'&&x.qi===e.qi&&!x.dead);
  });

  // FX
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.vx*=0.97;p.life-=dt/(p.ml*60);}
  particles=particles.filter(p=>p.life>0);
  explosions=explosions.filter(e=>{e.r+=3;e.life-=0.085;return e.life>0;});
  bullets=bullets.filter(b=>b.life>0);
  eBullets=eBullets.filter(b=>b.life>0);
  pickupTexts=pickupTexts.filter(t=>{t.y+=t.vy;t.life-=0.012;return t.life>0;});

  // Wave clear
  if(enemies.filter(e=>e.type==='letter'||e.type==='mcq').length===0){
    wave++;
    if(wave>10)state='results';
    else startWave();
  }
}

function hitSpellEnemy(e){
  if(e.wi===letterIdx){
    e.dead=true;totalCorrect++;streak++;combo++;comboTimer=110;
    const pts=Math.floor(150*(1+combo*0.5));score+=pts;
    spawnExpl(e.x,e.y,false,'#00ffaa');shake(1);
    spawnPT(e.x,e.y-30,`+${pts}`,'#00ffaa',false);
    letterIdx++;
    if(streak>=3)spawnPT(e.x,e.y-50,`🔥 STREAK ${streak}!`,'#FFD700',false);
  }else{
    totalWrong++;streak=0;combo=0;
    spawnExpl(e.x,e.y,false,'#ff4444');shake(3);
    hitPlayer(18);e.hitFlash=1;
    spawnPT(W/2,H/2-50,`Spell: ${currentWord.en}`,'#ff9944',true);
    spawnPT(e.x,e.y-30,'順序錯誤!','#ff4444',false);
  }
}

function hitMCQEnemy(e){
  if(e.isCorrect){
    e.dead=true;totalCorrect++;streak++;combo++;comboTimer=110;
    const pts=Math.floor(200*(1+combo*0.4));score+=pts;
    spawnExpl(e.x,e.y,true,'#00ffcc');shake(1.5);
    spawnPT(e.x,e.y-38,`✓ ${e.word}`,'#00ffcc',false);
    spawnPT(e.x,e.y-58,`+${pts}`,'#FFD700',false);
    if(streak>=3)spawnPT(W/2,H/3,`🔥 STREAK ${streak}!`,'#FFD700',true);
    enemies.filter(en=>en.type==='mcq'&&en.qi===e.qi&&!en.isCorrect).forEach(en=>{spawnExpl(en.x,en.y,false,'#333');en.dead=true;});
    player.hp=Math.min(player.maxHp,player.hp+12);
    spawnPT(player.x,player.y-30,'+12 HP','#44ff88',false);
  }else{
    totalWrong++;streak=0;combo=0;
    spawnExpl(e.x,e.y,false,'#ff4444');shake(3);
    const correct=enemies.find(en=>en.type==='mcq'&&en.qi===e.qi&&en.isCorrect);
    spawnPT(W/2,H/2-50,`✗ 正確答案: ${correct?correct.word:'?'}`,'#ff4466',true);
    hitPlayer(22);e.hitFlash=1;
  }
}

function hitPlayer(dmg){
  if(player.invincible>0)return;
  player.hp-=dmg;shake(3.5);player.invincible=80;
  spawnExpl(player.x,player.y,false,'#ff4466');
  if(player.hp<=0){
    lives--;
    if(lives>0){player.hp=player.maxHp;spawnPT(W/2,H/2,'LIFE LOST!','#ff4466',true);}
    else{state='dead';if(score>hiScore){hiScore=score;localStorage.setItem('wb_hi',hiScore);}
      spawnExpl(player.x,player.y,true,'#ff4466');}
  }
}

// ── Draw ──────────────────────────────────────────────────────────────
function draw(t){
  ctx.save();
  if(shakeAmt>0.1)ctx.translate(shakeX,shakeY);
  ctx.fillStyle='#03040e';ctx.fillRect(-10,-10,W+20,H+20);
  for(const n of bgNebula){const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,`hsla(${n.h},55%,30%,0.055)`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);}
  for(const s of bgStars){ctx.globalAlpha=s.b;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;

  if(state==='playing'){
    for(const e of explosions){ctx.globalAlpha=e.life*0.45;ctx.strokeStyle=e.col;ctx.lineWidth=1.8;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.stroke();}ctx.globalAlpha=1;
    for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
    for(const b of eBullets){ctx.globalAlpha=b.life;ctx.fillStyle=b.col||'#ff6600';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
    for(const b of bullets){
      for(let i=0;i<b.trail.length;i++){const ta=i/b.trail.length;ctx.globalAlpha=ta*0.4;ctx.fillStyle='#00ffcc';ctx.beginPath();ctx.arc(b.trail[i].x,b.trail[i].y,b.r*ta*0.8,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#00ffcc';ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.5,0,Math.PI*2);ctx.fill();
    }ctx.globalAlpha=1;
    for(const e of enemies){if(!e.dead)drawEnemy(e,t);}
    drawShip(t);
    for(const pt of pickupTexts){ctx.globalAlpha=Math.min(1,pt.life*2);ctx.fillStyle=pt.col;ctx.font=`bold ${pt.big?19:13}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pt.txt,pt.x,pt.y);}ctx.globalAlpha=1;
    drawHUD(t);
    if(paused)drawPause();
    if(touchMove){ctx.globalAlpha=0.22;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(touchMove.ox,touchMove.oy,28,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=0.48;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(touchMove.cx,touchMove.cy,12,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  }
  ctx.restore();
  if(state==='menu')drawMenu(t);
  else if(state==='dead')drawGameOver(t);
  else if(state==='results')drawResults(t);
}

function drawEnemy(e,t){
  if(e.type==='question'){
    ctx.save();ctx.globalAlpha=0.85+0.1*Math.sin(t/400+e.qi);
    const tw=ctx.measureText(e.text).width+20;
    rr(e.x-Math.max(tw,90)/2,e.y-14,Math.max(tw,90),28,6);
    ctx.fillStyle='rgba(6,15,50,0.92)';ctx.fill();
    ctx.strokeStyle='rgba(80,160,255,0.5)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#aaddff';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.text,e.x,e.y);
    ctx.restore();return;
  }
  ctx.save();ctx.translate(e.x,e.y+Math.sin(t/700+e.wobble)*6);
  const fl=e.hitFlash>0;
  if(e.type==='letter'){
    const isTarget=e.wi===letterIdx;
    const done=e.wi<letterIdx;
    ctx.fillStyle=done?'#1a3a1a':fl?'#fff':isTarget?'#c5e8ff':'#3a5065';
    ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(Math.cos(a)*22,Math.sin(a)*22);}ctx.closePath();ctx.fill();
    ctx.strokeStyle=isTarget?`rgba(0,230,255,${0.5+0.4*Math.sin(t/250)})`:'rgba(70,110,150,0.35)';ctx.lineWidth=isTarget?2:1;
    ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(Math.cos(a)*22,Math.sin(a)*22);}ctx.closePath();ctx.stroke();
    if(isTarget){ctx.globalAlpha=0.22+0.18*Math.sin(t/250);ctx.strokeStyle='#00ffff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
    ctx.fillStyle=done?'#44aa44':isTarget?'#ffffff':'#99bbcc';
    ctx.font=`bold ${isTarget?23:18}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.letter,0,1);
    if(isTarget){ctx.fillStyle=`rgba(0,255,200,${0.5+0.4*Math.sin(t/260)})`;ctx.beginPath();ctx.moveTo(-7,-27);ctx.lineTo(0,-19);ctx.lineTo(7,-27);ctx.closePath();ctx.fill();}
  }else if(e.type==='mcq'){
    const fc=fl?'#fff':e.isCorrect?'#182e18':'#362415';
    ctx.fillStyle=fc;rr(-28,-15,56,30,8);ctx.fill();
    ctx.strokeStyle=fl?'#fff':e.isCorrect?'rgba(0,255,150,0.38)':'rgba(190,140,50,0.28)';ctx.lineWidth=1;rr(-28,-15,56,30,8);ctx.stroke();
    ctx.fillStyle=e.isCorrect?'#00ff88':'#ff9944';ctx.beginPath();ctx.arc(-8,0,4.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(8,0,4.5,0,Math.PI*2);ctx.fill();
    rr(-28,-34,56,17,5);ctx.fillStyle='rgba(4,8,28,0.9)';ctx.fill();ctx.strokeStyle='rgba(70,110,190,0.32)';ctx.lineWidth=0.7;rr(-28,-34,56,17,5);ctx.stroke();
    ctx.fillStyle='#ddeeff';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.word,0,-26);
  }
  ctx.restore();
}

function drawShip(t){
  const p=player;
  for(let i=0;i<p.trail.length;i++){const ta=i/p.trail.length;ctx.globalAlpha=ta*0.18;ctx.fillStyle='#00ffcc';ctx.beginPath();ctx.arc(p.trail[i].x,p.trail[i].y,7*ta,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
  const tx=touchFire?touchFire.x:mx,ty=touchFire?touchFire.y:my;
  const angle=Math.atan2(ty-p.y,tx-p.x);
  const fl=p.invincible>0&&Math.floor(p.invincible/7)%2===0;
  if(fl)ctx.globalAlpha=0.3;
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(angle+Math.PI/2);
  const ec=0.5+0.4*Math.sin(t/90);
  ctx.fillStyle=`rgba(0,140,255,${ec*0.4})`;ctx.beginPath();ctx.ellipse(0,13,6,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#00ffcc';ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(12,12);ctx.lineTo(0,7);ctx.lineTo(-12,12);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(5,4);ctx.lineTo(0,0);ctx.lineTo(-5,4);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.62)';ctx.beginPath();ctx.ellipse(0,-5,3.5,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(80,200,255,0.85)';ctx.beginPath();ctx.ellipse(0,-6,2,4.5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();ctx.globalAlpha=1;
}

function drawHUD(t){
  ctx.save();
  // HP bar
  const bx=8,by=H-20,bw=145,bh=11;
  ctx.fillStyle='rgba(0,0,0,0.62)';rr(bx,by,bw,bh,5);ctx.fill();
  const hp=player.hp/player.maxHp,hpc=hp>0.6?'#44ff88':hp>0.3?'#ffaa00':'#ff3333';
  ctx.fillStyle=hpc;rr(bx,by,bw*hp,bh,5);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(`HP ${player.hp}`,bx+5,by+5.5);

  // Score
  ctx.fillStyle='rgba(0,0,0,0.55)';rr(W/2-72,4,144,28,8);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(score).padStart(7,'0'),W/2,19);

  // Wave
  ctx.fillStyle='rgba(0,0,0,0.55)';rr(W-98,4,90,28,8);ctx.fill();
  ctx.fillStyle='#aaddff';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText(`WAVE ${wave}/10`,W-53,19);

  // Lives
  ctx.fillStyle='rgba(0,0,0,0.5)';rr(W-98,36,90,20,7);ctx.fill();
  ctx.fillStyle='#ff6688';ctx.font='14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('♥'.repeat(Math.max(0,lives)),W-53,46);

  // Combo
  if(combo>1){ctx.globalAlpha=Math.min(1,comboTimer/55*2);ctx.fillStyle=combo>5?'#FFD700':'#00ffcc';ctx.font=`bold ${11+Math.min(combo,7)}px monospace`;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(`×${combo} COMBO`,10,H-40);}ctx.globalAlpha=1;

  // Mode label
  ctx.fillStyle='rgba(0,0,0,0.6)';rr(4,4,Math.min(W-108,310),22,6);ctx.fill();
  ctx.strokeStyle='rgba(60,120,200,0.3)';ctx.lineWidth=0.7;rr(4,4,Math.min(W-108,310),22,6);ctx.stroke();
  ctx.fillStyle='#88ccff';ctx.font='10px monospace';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(modeLabel.slice(0,50),10,16);

  // Spell progress bar
  if(modeType==='spell'&&currentWord){
    const w=currentWord.en,lw=24,sx=W/2-w.length*lw/2;
    ctx.fillStyle='rgba(0,0,0,0.62)';rr(sx-8,H-44,w.length*lw+16,28,7);ctx.fill();
    for(let i=0;i<w.length;i++){
      const lx=sx+i*lw+lw/2;
      const pulse=0.65+0.35*Math.sin(t/240);
      ctx.fillStyle=i<letterIdx?'#44ff88':i===letterIdx?`rgba(0,220,255,${pulse})`:'rgba(45,65,105,0.7)';
      ctx.font=`bold ${i===letterIdx?17:14}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(w[i],lx,H-30);
    }
  }

  // Accuracy
  const total=totalCorrect+totalWrong;
  if(total>0){
    const acc=Math.round(totalCorrect/total*100);
    ctx.fillStyle='rgba(0,0,0,0.5)';rr(8,H-60,82,16,5);ctx.fill();
    ctx.fillStyle=acc>=80?'#44ff88':acc>=60?'#ffaa00':'#ff4444';ctx.font='9px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(`準確率 ${acc}%  ${totalCorrect}/${total}`,13,H-52);
  }
  ctx.restore();
}

function drawPause(){
  ctx.fillStyle='rgba(0,0,10,0.74)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#aaddff';ctx.font='bold 34px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('PAUSED',W/2,H/2-12);
  ctx.fillStyle='rgba(140,170,210,0.7)';ctx.font='13px monospace';ctx.fillText('P / ESC 繼續',W/2,H/2+22);
}

function drawMenu(t){
  ctx.fillStyle='rgba(0,0,10,0.8)';ctx.fillRect(0,0,W,H);
  const pulse=0.85+0.15*Math.sin(t/300);
  ctx.globalAlpha=pulse;ctx.fillStyle='#FFD700';ctx.font='bold 44px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('WORD BLASTER',W/2,H/2-108);ctx.globalAlpha=1;
  ctx.fillStyle='#cc8800';ctx.font='bold 15px monospace';ctx.fillText('英文學習射擊遊戲',W/2,H/2-70);

  const modes=[
    ['📝 拼寫模式','按字母順序擊落敵機，拼出目標單詞！','#00ffcc'],
    ['🌐 翻譯模式','睇中文意思，射出正確英文單詞！','#00aaff'],
    ['🔍 定義模式','睇英文定義，射出符合的單詞！','#aaff00'],
  ];
  ctx.fillStyle='rgba(0,0,0,0.58)';rr(W/2-190,H/2-45,380,152,10);ctx.fill();
  ctx.strokeStyle='rgba(55,95,185,0.38)';ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<modes.length;i++){
    ctx.fillStyle=modes[i][2];ctx.font='bold 12px monospace';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(modes[i][0],W/2-175,H/2-18+i*40);
    ctx.fillStyle='rgba(160,190,215,0.75)';ctx.font='11px monospace';ctx.fillText(modes[i][1],W/2-175,H/2-1+i*40);
  }
  ctx.fillStyle='rgba(150,175,215,0.55)';ctx.font='11px monospace';ctx.textAlign='center';
  ctx.fillText('30個英文詞彙 · 10波挑戰 · 完成後獲得成績評級',W/2,H/2+118);
  const bp=0.5+0.5*Math.sin(t/250);
  ctx.fillStyle=`rgba(0,255,180,${bp})`;ctx.font='bold 16px monospace';ctx.fillText('▶  點擊 / 空白鍵開始',W/2,H/2+148);
  ctx.fillStyle='rgba(130,160,200,0.55)';ctx.font='11px monospace';ctx.fillText(`BEST: ${String(hiScore).padStart(7,'0')}`,W/2,H/2+172);
}

function drawGameOver(t){
  ctx.fillStyle='rgba(0,0,10,0.82)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ff3333';ctx.font='bold 44px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('GAME OVER',W/2,H/2-78);
  ctx.fillStyle='#FFD700';ctx.font='bold 20px monospace';ctx.fillText(`SCORE: ${String(score).padStart(7,'0')}`,W/2,H/2-28);
  const total=totalCorrect+totalWrong,acc=total>0?Math.round(totalCorrect/total*100):0;
  ctx.fillStyle='#aaddff';ctx.font='13px monospace';ctx.fillText(`正確: ${totalCorrect}  錯誤: ${totalWrong}  準確率: ${acc}%`,W/2,H/2+10);
  ctx.fillStyle=score>=hiScore?'#FFD700':'rgba(140,170,210,0.65)';ctx.font='12px monospace';ctx.fillText(score>=hiScore?'🏆 NEW RECORD! '+score:'BEST: '+hiScore,W/2,H/2+38);
  const bp=0.5+0.5*Math.sin(t/250);ctx.fillStyle=`rgba(0,255,180,${bp})`;ctx.font='bold 15px monospace';ctx.fillText('點擊 / 空白鍵重試',W/2,H/2+72);
}

function drawResults(t){
  ctx.fillStyle='rgba(0,0,10,0.9)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFD700';ctx.font='bold 30px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🏆 COURSE COMPLETE! 🏆',W/2,78);
  const total=totalCorrect+totalWrong,acc=total>0?Math.round(totalCorrect/total*100):0;
  const grade=acc>=90?'S':acc>=80?'A':acc>=70?'B':acc>=60?'C':'D';
  const gcol={S:'#FFD700',A:'#00ffcc',B:'#00aaff',C:'#ffaa00',D:'#ff4444'}[grade];
  ctx.fillStyle=gcol;ctx.font='bold 68px monospace';ctx.fillText(grade,W/2,178);
  // Stars
  const stars=acc>=90?5:acc>=80?4:acc>=70?3:acc>=60?2:1;
  ctx.font='28px monospace';ctx.fillText('⭐'.repeat(stars)+'☆'.repeat(5-stars),W/2,234);
  ctx.fillStyle='#aaddff';ctx.font='14px monospace';
  ctx.fillText(`最終分數: ${score}`,W/2,270);
  ctx.fillText(`正確: ${totalCorrect}  錯誤: ${totalWrong}  準確率: ${acc}%`,W/2,296);
  ctx.fillStyle='rgba(160,190,220,0.7)';ctx.font='12px monospace';
  const msg=acc>=90?'完美！你係英文大師！':acc>=80?'叻仔！A級成績！':acc>=70?'做得好！繼續加油！':acc>=50?'繼續練習，你會進步的！':'唔緊要，再試一次！';
  ctx.fillText(msg,W/2,328);
  if(score>=hiScore&&score>0){ctx.fillStyle='#FFD700';ctx.font='12px monospace';ctx.fillText('🏆 NEW RECORD!',W/2,352);}
  const bp=0.5+0.5*Math.sin(t/250);ctx.fillStyle=`rgba(0,255,180,${bp})`;ctx.font='bold 15px monospace';ctx.fillText('點擊再玩',W/2,390);
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

let lastT=0;
initBG();
function loop(t){const dt=(t-lastT)/16.67;lastT=t;update(Math.min(dt,3));draw(t);requestAnimationFrame(loop);}
requestAnimationFrame(loop);
})();
</script>
</body>
